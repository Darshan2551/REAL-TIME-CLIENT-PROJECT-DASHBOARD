services:
  db:
    image: postgres:16-alpine
    container_name: agency_dashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: client_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d client_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
    container_name: agency_dashboard_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/client_dashboard
      ACCESS_TOKEN_SECRET: change-me-access-token-secret-very-long
      REFRESH_TOKEN_SECRET: change-me-refresh-token-secret-very-long
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN_DAYS: 7
      CLIENT_ORIGIN: http://localhost:5173
      BCRYPT_SALT_ROUNDS: 10
      CRON_OVERDUE_SCHEDULE: "*/5 * * * *"
    command: sh -c "npm run prisma:push && npm run seed && npm run dev"
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    container_name: agency_dashboard_client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
